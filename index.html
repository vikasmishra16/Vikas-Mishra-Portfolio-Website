<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VIKAS MISHRA | THE ARCHIVES</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --color-bg: #050505;
        --color-text: #ffffff;
        --color-accent: #ccff00; /* Acid Lime */
        --color-accent-2: #ff00ff; /* Hot Pink */
      }

      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: var(--color-bg);
        color: var(--color-text);
        overflow-x: hidden;
        cursor: none; /* Custom cursor */
      }

      .font-display {
        font-family: 'Syne', sans-serif;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 12px;
      }
      ::-webkit-scrollbar-track {
        background: #000;
      }
      ::-webkit-scrollbar-thumb {
        background: #ccff00;
        border: 2px solid #000;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #fff;
      }

      /* Hard Shadow Utility - Dark Mode Adapted */
      .hard-shadow {
        box-shadow: 6px 6px 0px 0px #333; /* Dark Grey Shadow */
        transition: all 0.2s ease;
      }
      .hard-shadow:hover {
        box-shadow: 10px 10px 0px 0px #ccff00; /* Lime Shadow on Hover */
        transform: translate(-2px, -2px);
      }
      
      .hard-shadow-sm {
        box-shadow: 4px 4px 0px 0px #333;
      }

      /* Custom Cursor */
      .cursor-dot {
        width: 20px;
        height: 20px;
        background-color: #ccff00; /* Lime cursor for visibility */
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: width 0.2s, height 0.2s, background-color 0.2s;
        mix-blend-mode: exclusion;
      }
      
      /* Grain Texture Overlay */
      .grain {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9000;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      }

      /* Marquee Animation */
      .marquee-container {
        overflow: hidden;
        white-space: nowrap;
      }
      .marquee-content {
        display: inline-block;
        animation: marquee 20s linear infinite;
      }
      @keyframes marquee {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      /* Selection */
      ::selection {
        background: #ccff00;
        color: #000;
      }
    </style>
      <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="grain"></div>
    <div id="cursor" class="cursor-dot hidden md:block"></div>
    <div id="root"></div>
    <script>
      const cursor = document.getElementById('cursor');
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
      
      document.querySelectorAll('a, button, .hover-trigger').forEach(el => {
        el.addEventListener('mouseenter', () => {
          cursor.style.width = '60px';
          cursor.style.height = '60px';
          cursor.style.backgroundColor = '#ff00ff';
        });
        el.addEventListener('mouseleave', () => {
          cursor.style.width = '20px';
          cursor.style.height = '20px';
          cursor.style.backgroundColor = '#ccff00';
        });
      });
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
